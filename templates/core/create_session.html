{% extends 'core/base.html' %}
{% block title %}Create Session — SIKIKA{% endblock %}
{% block content %}
<div class="container" style="max-width:500px; margin-top:60px;">
    <div class="card-dark p-4">
        <h2 style="font-family:'Space Grotesk',sans-serif; font-weight:600; margin-bottom:24px;">Create Lecture Session</h2>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                <label class="form-label">{{ field.label }}</label>
                {{ field }}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-sikika w-100 mt-2">Start Session</button>
        </form>
    </div>
</div>

<style>
    input[type="text"] {
        background: rgba(255,255,255,0.05) !important;
        border: 1px solid rgba(255,255,255,0.1) !important;
        color: #fff !important;
        border-radius: 8px !important;
        padding: 10px 14px;
        width: 100%;
    }
</style>
{% endblock %}
